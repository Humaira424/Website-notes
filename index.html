<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnify Education - Home</title>
    <!-- CSS File Link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Header Section -->
    <header class="header">
        <div class="logo-section">
            <img src="assets/images/logo.png" alt="Learnify Logo">
            <h1>Learnify Education </h1>
        </div>

        <!-- Centered Links -->
        <nav class="nav-links-center">
            <a href="index.html">Home</a>
            <div class="dropdown">
                <a href="#" style="cursor: default;">Classes ▾</a>
                <div class="dropdown-content">
                    <a href="notes.html?class=9th">9th Class</a>
                    <a href="notes.html?class=10th">10th Class</a>
                    <a href="notes.html?class=11th">11th Class</a>
                    <a href="notes.html?class=12th">12th Class</a>
                </div>
            </div>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>

        <!-- Search Bar on Right -->
        <div class="search-container">
            <input type="text" id="navSearchInput" class="nav-search" placeholder="Search Subject..."
                onkeyup="searchFromNav()">
            <i class="fas fa-search search-icon"></i>
            <button id="themeBtn" class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark Mode">🌙</button>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container">

        <!-- Hero Section -->
        <div class="hero-section">
            <div class="hero-title">Welcome to Learnify Education</div>
            <div class="hero-tagline">Your Study Partner for Class 9th to 12th</div>

            <img src="assets/images/study.jpg" class="hero-img" alt="study image">
            <div class="hero-buttons">
                <a href="upload.html" class="btn">Upload Notes</a>
                <a href="notes.html" class="btn">View Notes</a>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <footer class="footer">
        &copy; 2026 Learnify Education | All Rights Reserved
    </footer>

    <!-- JavaScript File Link -->
    <script src="js/app.js"></script>
</body>

</html>
