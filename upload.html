<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnify Education - Upload</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Header Section -->
    <header class="header">
        <div class="logo-section">
            <img src="assets/images/logo.png" alt="Learnify Logo">
            <h1>Learnify Education</h1>
        </div>

        <!-- Centered Links -->
        <nav class="nav-links-center">
            <a href="index.html">Home</a>
            <div class="dropdown">
                <a href="#" style="cursor: default;">Classes ▾</a>
                <div class="dropdown-content">
                    <a href="notes.html?class=9th">9th Class</a>
                    <a href="notes.html?class=10th">10th Class</a>
                    <a href="notes.html?class=11th">11th Class</a>
                    <a href="notes.html?class=12th">12th Class</a>
                </div>
            </div>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>

        <!-- Search Bar on Right -->
        <div class="search-container">
            <input type="text" id="navSearchInput" class="nav-search" placeholder="Search Subject..."
                onkeyup="searchFromNav()">
            <i class="fas fa-search search-icon"></i>
            <button id="themeBtn" class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark Mode">🌙</button>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container">
        <div class="card" style="margin: 0 auto; width: 450px;">
            <h2>Upload New PDF Notes</h2>
            <br>
            <form id="uploadForm">
                <div class="form-group">
                    <label>Select Class:</label>
                    <select id="classSelect" onchange="updateUploadSubjects()">
                        <option value="9th">Class 9th</option>
                        <option value="10th">Class 10th</option>
                        <option value="11th">Class 11th</option>
                        <option value="12th">Class 12th</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Subject Name:</label>
                    <select id="subjectName" required>
                        <!-- Populated by JS -->
                    </select>
                </div>
                <div class="form-group">
                    <label>Title of Notes:</label>
                    <input type="text" id="noteTitle" placeholder="e.g. Physics Chapter 1" required>
                </div>
                <div class="form-group">
                    <label>Chapter Number:</label>
                    <input type="number" id="chapterNumber" placeholder="e.g. 1" required>
                </div>
                <div class="form-group">
                    <label>PDF Notes Ka Link Paste Karein:</label>
                    <input type="url" id="pdfLink" placeholder="Yahan link paste karein..." required>
                </div>
                <br>
                <button type="button" class="btn" onclick="uploadNote()">Upload Note</button>
            </form>
            <p id="uploadStatus" style="color: green; margin-top: 10px; display: none;">Note kamyabi se upload ho gaya!
            </p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        &copy; 2026 Learnify Education | All Rights Reserved
    </footer>

    <!-- Firebase SDKs (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>

    <!-- Project JS Files -->
    <script src="js/firebase-db.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
