<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnify Education - Contact Us</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header Section -->
    <header class="header">
        <div class="logo-section">
            <img src="assets/images/logo.png" alt="Learnify Logo">
            <h1>Learnify Education</h1>
        </div>
        
        <nav class="nav-links-center">
            <a href="index.html">Home</a>
            <div class="dropdown">
                <a href="#" style="cursor: default;">Classes ▾</a>
                <div class="dropdown-content">
                    <a href="notes.html?class=9th">9th Class</a>
                    <a href="notes.html?class=10th">10th Class</a>
                    <a href="notes.html?class=11th">11th Class</a>
                    <a href="notes.html?class=12th">12th Class</a>
                </div>
            </div>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>

        <div class="search-container">
            <input type="text" id="navSearchInput" class="nav-search" placeholder="Search Subject..." onkeyup="searchFromNav()">
            <i class="fas fa-search search-icon" style="right: 50px;"></i>
            <button id="themeBtn" class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark Mode">🌙</button>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container">
        <div class="card" style="margin: 0 auto; width: 500px; text-align: left;">
            <h2 style="color: var(--primary-color); text-align: center; margin-bottom: 20px;">Contact Us</h2>
            <p style="text-align: center; margin-bottom: 20px;">Agar aapko koi notes chahiye ya koi sawal hai, tou form fill karein!</p>
            
            <form id="contactForm" onsubmit="event.preventDefault(); alert('Message Sent Successfully!'); this.reset();">
                <div class="form-group">
                    <label>Aapka Naam:</label>
                    <input type="text" required placeholder="Ali Ahmad">
                </div>
                <div class="form-group">
                    <label>Email Address:</label>
                    <input type="email" required placeholder="ali@example.com">
                </div>
                <div class="form-group">
                    <label>Class:</label>
                    <select required>
                        <option value="">Select Class</option>
                        <option>9th Class</option>
                        <option>10th Class</option>
                        <option>11th Class</option>
                        <option>12th Class</option>
                        <option>Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Message / Kaam ki baat:</label>
                    <textarea rows="4" required placeholder="Yahan apna message likhein..."></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Send Message</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        &copy; 2026 Learnify Education | All Rights Reserved
    </footer>

    <!-- JavaScript File Link -->
    <script src="js/app.js"></script>
</body>
</html>
